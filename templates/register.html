<!-- templates/register.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - معجم توات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .register-container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo h1 {
            color: #2c3e50;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2ecc71;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        
        .btn:hover {
            background: #27ae60;
        }
        
        .links {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .links a {
            color: #2ecc71;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .password-strength {
            height: 5px;
            background: #ddd;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .strength-meter {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .strength-weak { background: #e74c3c; }
        .strength-medium { background: #f39c12; }
        .strength-strong { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🏺 معجم توات</h1>
            <p>إنشاء حساب جديد</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" name="username" required 
                       placeholder="اسمك أو لقبك">
            </div>
            
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" required 
                       placeholder="example@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" required 
                       placeholder="********" oninput="checkPassword()">
                <div class="password-strength">
                    <div id="strength-meter" class="strength-meter"></div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">تأكيد كلمة المرور</label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                       placeholder="********" oninput="checkPasswordsMatch()">
                <div id="password-match" style="color: #e74c3c; font-size: 0.9rem; margin-top: 5px; display: none;">
                    ⚠️ كلمات المرور غير متطابقة
                </div>
            </div>
            
            <button type="submit" class="btn" id="submit-btn">إنشاء حساب</button>
        </form>
        
        <div class="links">
            <a href="{{ url_for('login') }}">لديك حساب؟ سجل الدخول</a> | 
            <a href="{{ url_for('index') }}">العودة للرئيسية</a>
        </div>
    </div>
    
    <script>
        // التركيز على حقل اسم المستخدم
        document.getElementById('username').focus();
        
        // تحقق من قوة كلمة المرور
        function checkPassword() {
            const password = document.getElementById('password').value;
            const meter = document.getElementById('strength-meter');
            let strength = 0;
            
            // قياس القوة
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            // تحديث المقياس
            meter.className = 'strength-meter';
            if (strength === 0) {
                meter.style.width = '0%';
            } else if (strength === 1) {
                meter.style.width = '25%';
                meter.classList.add('strength-weak');
            } else if (strength === 2) {
                meter.style.width = '50%';
                meter.classList.add('strength-medium');
            } else if (strength === 3) {
                meter.style.width = '75%';
                meter.classList.add('strength-medium');
            } else {
                meter.style.width = '100%';
                meter.classList.add('strength-strong');
            }
            
            checkPasswordsMatch();
        }
        
        // تحقق من تطابق كلمتي المرور
        function checkPasswordsMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const matchDiv = document.getElementById('password-match');
            const submitBtn = document.getElementById('submit-btn');
            
            if (confirmPassword === '') {
                matchDiv.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            } else if (password !== confirmPassword) {
                matchDiv.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            } else {
                matchDiv.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }
        }
        
        // إضافة زر إظهار/إخفاء لكلمات المرور
        ['password', 'confirm_password'].forEach(fieldId => {
            const field = document.getElementById(fieldId);
            const showPasswordBtn = document.createElement('button');
            showPasswordBtn.type = 'button';
            showPasswordBtn.innerHTML = '👁️';
            showPasswordBtn.style.position = 'absolute';
            showPasswordBtn.style.right = '10px';
            showPasswordBtn.style.top = '35px';
            showPasswordBtn.style.background = 'none';
            showPasswordBtn.style.border = 'none';
            showPasswordBtn.style.cursor = 'pointer';
            showPasswordBtn.style.fontSize = '1.2rem';
            
            field.parentElement.style.position = 'relative';
            field.style.paddingRight = '40px';
            showPasswordBtn.onclick = function() {
                if (field.type === 'password') {
                    field.type = 'text';
                    this.innerHTML = '👁️‍🗨️';
                } else {
                    field.type = 'password';
                    this.innerHTML = '👁️';
                }
            };
            
            field.parentElement.appendChild(showPasswordBtn);
        });
    </script>
</body>
</html>
