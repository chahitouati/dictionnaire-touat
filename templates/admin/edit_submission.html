<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الطلب - معجم توات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: url('/static/images/touat.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
        }
        h1 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        .image-preview { max-width: 100%; max-height: 150px; border-radius: 10px; margin-top: 10px; }
        .audio-player { width: 100%; margin-top: 10px; }
        .btn-save { background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-back { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
        .current-media { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-edit"></i> تعديل الطلب #{{ submission.id }}</h1>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>الكلمة العربية:</label>
                <input type="text" name="word_arabic" value="{{ submission.word_arabic }}" required>
            </div>
            
            <div class="form-group">
                <label>التعريف:</label>
                <textarea name="definition" required>{{ submission.definition }}</textarea>
            </div>
            
            <div class="form-group">
                <label>مثال للاستخدام (اختياري):</label>
                <textarea name="example">{{ submission.example or '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label>المنطقة:</label>
                <select name="region">
                    <option value="توات" {% if submission.region == 'توات' %}selected{% endif %}>توات</option>
                    <option value="أدرار" {% if submission.region == 'أدرار' %}selected{% endif %}>أدرار</option>
                    <option value="تيميمون" {% if submission.region == 'تيميمون' %}selected{% endif %}>تيميمون</option>
                    <option value="رقان" {% if submission.region == 'رقان' %}selected{% endif %}>رقان</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>المجال:</label>
                <input type="text" name="category" value="{{ submission.category or '' }}">
            </div>
            
            <!-- الصورة الحالية -->
            <div class="form-group">
                <label>🖼️ الصورة الحالية:</label>
                {% if submission.image_path %}
                <div class="current-media">
                    <img src="{{ url_for('static', filename=submission.image_path) }}" class="image-preview">
                    <p><small>مسار الصورة: {{ submission.image_path }}</small></p>
                </div>
                {% else %}
                <div class="current-media">لا توجد صورة حالياً</div>
                {% endif %}
            </div>
            
            <!-- تغيير الصورة -->
            <div class="form-group">
                <label>📤 تغيير الصورة (اختياري):</label>
                <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/webp">
            </div>
            
            <!-- الصوت الحالي -->
            <div class="form-group">
                <label>🎵 التسجيل الصوتي الحالي:</label>
                {% if submission.audio_path %}
                <div class="current-media">
                    <audio controls class="audio-player">
                        <source src="{{ url_for('static', filename=submission.audio_path) }}">
                    </audio>
                    <p><small>مسار الصوت: {{ submission.audio_path }}</small></p>
                </div>
                {% else %}
                <div class="current-media">لا يوجد تسجيل صوتي حالياً</div>
                {% endif %}
            </div>
            
            <!-- تغيير الصوت -->
            <div class="form-group">
                <label>📤 تغيير التسجيل الصوتي (اختياري):</label>
                <input type="file" name="audio" accept="audio/mpeg,audio/wav,audio/ogg">
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> حفظ التعديلات</button>
                <a href="{{ url_for('admin_submissions') }}" class="btn-back">← العودة</a>
            </div>
        </form>
    </div>
</body>
</html>
