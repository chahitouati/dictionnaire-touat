<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - معجم توات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: url('/static/images/touat.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-save {
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .btn-save:hover { background: #27ae60; }
        .btn-back {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
        }
        .info-box {
            background: #e8f4fc;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-right: 4px solid #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-sliders-h"></i> إعدادات الموقع</h1>
        
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-font"></i> اسم الموقع</label>
                <input type="text" name="site_name" value="{{ site_name }}" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-info-circle"></i> وصف الموقع</label>
                <textarea name="site_description" class="form-control">{{ site_description }}</textarea>
            </div>
            
            <button type="submit" class="btn-save">
                <i class="fas fa-save"></i> حفظ الإعدادات
            </button>
        </form>
        
        <div class="info-box">
            <h3><i class="fas fa-info-circle"></i> معلومات النظام</h3>
            <p><strong>إصدار التطبيق:</strong> 1.0.0</p>
            <p><strong>قاعدة البيانات:</strong> SQLite</p>
            <p><strong>عدد الكلمات:</strong> {{ total_words if total_words else 0 }}</p>
            <p><strong>عدد المستخدمين:</strong> {{ total_users if total_users else 0 }}</p>
        </div>
        
        <div style="text-align: center;">
            <a href="{{ url_for('admin_dashboard') }}" class="btn-back">
                <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
            </a>
        </div>
    </div>
</body>
</html>
